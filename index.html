<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>내 가계부</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface2: #f0f0ee;
    --border: #e0e0dc;
    --text: #1a1a18;
    --muted: #888884;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --success: #16a34a;
    --success-bg: #f0fdf4;
    --warning-bg: #fffbeb;
    --warning: #b45309;
    --radius: 10px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  /* header */
  .header { padding: 20px 16px 0; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .month-nav { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .month-nav button { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); padding: 4px; }
  .month-nav span { font-size: 16px; font-weight: 500; }

  /* summary */
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 16px; }
  .stat { background: var(--surface); border-radius: var(--radius); padding: 12px; border: 1px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 16px; font-weight: 600; }
  .stat-value.income { color: var(--accent); }
  .stat-value.expense { color: var(--danger); }
  .stat-value.real { color: var(--success); }

  /* tabs */
  .tabs { display: flex; padding: 0 16px; gap: 0; border-bottom: 1px solid var(--border); }
  .tab { flex: 1; padding: 10px 0; font-size: 14px; font-weight: 500; background: none; border: none; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* content */
  .content { padding: 16px; }

  /* form */
  .form-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
  .type-toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 14px; }
  .type-btn { flex: 1; padding: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; background: var(--surface2); color: var(--muted); transition: all 0.15s; }
  .type-btn.active.out { background: var(--danger-bg); color: var(--danger); }
  .type-btn.active.in { background: var(--accent-bg); color: var(--accent); }
  .field-label { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field { margin-bottom: 10px; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    width: 100%; padding: 9px 11px; font-size: 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    outline: none; font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); background: var(--surface); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .date-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .date-btn { padding: 5px 12px; border-radius: 999px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; background: var(--surface2); color: var(--muted); }
  .date-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .tag-btn { padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; background: var(--surface2); color: var(--muted); }
  .tag-btn.active { background: var(--warning-bg); color: var(--warning); border-color: var(--warning); }
  .submit-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
  .submit-btn:active { opacity: 0.85; }

  /* list */
  .date-group-label { font-size: 12px; font-weight: 600; color: var(--muted); padding: 8px 0 5px; display: flex; justify-content: space-between; }
  .entry { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 11px 12px; margin-bottom: 6px; }
  .entry-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .entry-info { flex: 1; min-width: 0; }
  .entry-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .entry-amount { font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .entry-amount.out { color: var(--danger); }
  .entry-amount.in { color: var(--accent); }
  .del-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 4px; flex-shrink: 0; line-height: 1; }
  .badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 999px; background: var(--warning-bg); color: var(--warning); margin-left: 3px; }

  /* chart */
  .chart-section { margin-bottom: 16px; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 10px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .bar-label { font-size: 12px; color: var(--text); width: 80px; text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 16px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .bar-val { font-size: 11px; color: var(--muted); width: 62px; text-align: right; flex-shrink: 0; }
  .insight { background: var(--success-bg); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: var(--success); border: 1px solid #bbf7d0; margin-top: 12px; }

  /* notice */
  .notice { text-align: center; padding: 40px 0; font-size: 14px; color: var(--muted); }

  /* bottom nav */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; max-width: 480px; margin: 0 auto; }
  .nav-btn { flex: 1; padding: 12px 0 8px; background: none; border: none; cursor: pointer; font-size: 11px; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; line-height: 1; }

  /* modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); }

  @media (min-width: 480px) {
    .bottom-nav { left: 50%; transform: translateX(-50%); width: 480px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>내 가계부</h1>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="summary">
    <div class="stat"><div class="stat-label">수입</div><div class="stat-value income" id="s-income">0원</div></div>
    <div class="stat"><div class="stat-label">지출</div><div class="stat-value expense" id="s-expense">0원</div></div>
    <div class="stat"><div class="stat-label">실지출</div><div class="stat-value real" id="s-real">0원</div></div>
  </div>

  <div id="content-add" class="content">
    <div class="form-card">
      <div class="type-toggle">
        <button class="type-btn active out" onclick="setType('out')">지출</button>
        <button class="type-btn in" onclick="setType('in')">수입</button>
      </div>
      <div class="field">
        <div class="field-label">날짜</div>
        <div class="date-btns">
          <button class="date-btn active" onclick="setDate(0,this)">오늘</button>
          <button class="date-btn" onclick="setDate(1,this)">어제</button>
          <button class="date-btn" onclick="setDate(2,this)">그저께</button>
          <button class="date-btn" onclick="setDate(3,this)">3일전</button>
        </div>
        <input type="date" id="f-date" onchange="selectedDate=this.value; document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));" />
      </div>
      <div class="row2" style="margin-bottom:10px;">
        <div class="field">
          <div class="field-label">내용</div>
          <input type="text" id="f-desc" placeholder="예: 스타벅스" />
        </div>
        <div class="field">
          <div class="field-label">금액</div>
          <input type="number" id="f-amount" placeholder="0" />
        </div>
      </div>
      <div class="row2" style="margin-bottom:10px;">
        <div class="field">
          <div class="field-label">카테고리</div>
          <select id="f-cat">
            <option value="">선택</option>
            <option>식비</option><option>카페·간식</option><option>쇼핑</option>
            <option>취미·여가</option><option>교통·자동차</option><option>주거·통신</option>
            <option>보험·세금</option><option>편의점·마트</option><option>여행·숙박</option>
            <option>이체</option><option>저축·투자</option><option>기타</option>
          </select>
        </div>
        <div class="field">
          <div class="field-label">상대방 (선택)</div>
          <input type="text" id="f-who" placeholder="예: 친구" />
        </div>
      </div>
      <div class="field">
        <div class="field-label">태그</div>
        <div class="tags">
          <button class="tag-btn" onclick="toggleTag(this,'대표결제')">👥 대표결제</button>
          <button class="tag-btn" onclick="toggleTag(this,'회수완료')">✅ 회수완료</button>
          <button class="tag-btn" onclick="toggleTag(this,'고정지출')">📌 고정지출</button>
          <button class="tag-btn" onclick="toggleTag(this,'충동구매')">⚡ 충동구매</button>
        </div>
      </div>
      <button class="submit-btn" onclick="addEntry()">추가</button>
    </div>
  </div>

  <div id="content-list" class="content" style="display:none">
    <div id="entry-list"><div class="notice">이번 달 내역이 없어요</div></div>
  </div>

  <div id="content-chart" class="content" style="display:none">
    <div class="chart-section">
      <div class="chart-title">카테고리별 지출</div>
      <div id="chart-bars"><div class="notice">내역을 추가하면 분석이 나와요</div></div>
    </div>
    <div id="insight-box"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showTab('add')" id="nav-add">
    <span class="nav-icon">✏️</span>기록
  </button>
  <button class="nav-btn" onclick="showTab('list')" id="nav-list">
    <span class="nav-icon">📋</span>내역
  </button>
  <button class="nav-btn" onclick="showTab('chart')" id="nav-chart">
    <span class="nav-icon">📊</span>분석
  </button>
</div>

<script>
const CATS = {
  '식비':'#E24B4A','카페·간식':'#BA7517','쇼핑':'#533CB7','취미·여가':'#1D9E75',
  '교통·자동차':'#378ADD','주거·통신':'#0F6E56','보험·세금':'#888780',
  '편의점·마트':'#D4537E','여행·숙박':'#185FA5','이체':'#639922','저축·투자':'#3C3489','기타':'#5F5E5A'
};
const CAT_ICONS = {
  '식비':'🍚','카페·간식':'☕','쇼핑':'🛍','취미·여가':'🎮','교통·자동차':'🚌',
  '주거·통신':'🏠','보험·세금':'📋','편의점·마트':'🏪','여행·숙박':'✈️',
  '이체':'💸','저축·투자':'📈','기타':'📎'
};
const KEYWORDS = {
  '식비':['배달','요기요','쿠팡이츠','맥도날드','버거킹','롯데리아','교촌','bbq','bhc','김밥','찌개','식당','밥','피자','치킨'],
  '카페·간식':['스타벅스','이디야','투썸','할리스','메가커피','빽다방','카페','커피','베이커리','뚜레쥬르','파리바게뜨'],
  '쇼핑':['쿠팡','11번가','지마켓','옥션','무신사','올리브영','다이소','아마존'],
  '편의점·마트':['gs25','cu','세븐일레븐','미니스톱','이마트','홈플러스','롯데마트','코스트코'],
  '교통·자동차':['카카오택시','우버','버스','지하철','주유','주차','기차','ktx','코레일','타다'],
  '취미·여가':['넷플릭스','유튜브','게임','영화','cgv','메가박스','롯데시네마','스포티파이','왓챠'],
  '주거·통신':['kt','skt','lgu','sk텔레콤','전기','가스','수도','관리비'],
  '여행·숙박':['숙박','호텔','에어비앤비','야놀자','여기어때'],
};

let entries = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let selectedType = 'out';
let selectedTags = new Set();
let selectedDate = getDateStr(0);

function getDateStr(daysAgo) {
  const d = new Date(); d.setDate(d.getDate() - daysAgo);
  return d.toISOString().slice(0,10);
}

function load() {
  try { entries = JSON.parse(localStorage.getItem('ledger_entries') || '[]'); } catch(e){ entries=[]; }
}
function save() {
  try { localStorage.setItem('ledger_entries', JSON.stringify(entries)); } catch(e){}
}

function fmt(n) { return Math.abs(Math.round(n)).toLocaleString('ko-KR') + '원'; }

function guessCategory(text) {
  const t = text.toLowerCase();
  for (const [cat, kws] of Object.entries(KEYWORDS)) {
    if (kws.some(k => t.includes(k))) return cat;
  }
  return '';
}

function setType(t) {
  selectedType = t;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.type-btn.' + t).classList.add('active');
}

function setDate(daysAgo, btn) {
  selectedDate = getDateStr(daysAgo);
  document.getElementById('f-date').value = selectedDate;
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleTag(btn, tag) {
  if (selectedTags.has(tag)) { selectedTags.delete(tag); btn.classList.remove('active'); }
  else { selectedTags.add(tag); btn.classList.add('active'); }
}

function addEntry() {
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseInt(document.getElementById('f-amount').value);
  if (!desc || !amount) { alert('내용과 금액을 입력해주세요'); return; }
  const cat = document.getElementById('f-cat').value || guessCategory(desc);
  const who = document.getElementById('f-who').value.trim();
  entries.unshift({
    id: Date.now(),
    desc, amount, cat, who,
    date: selectedDate,
    type: selectedType,
    tags: [...selectedTags]
  });
  save(); render();
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-who').value = '';
  document.getElementById('f-cat').value = '';
  selectedTags.clear();
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
}

function deleteEntry(id) {
  if (!confirm('삭제할까요?')) return;
  entries = entries.filter(e => e.id !== id);
  save(); render();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  render();
}

function monthEntries() {
  const prefix = currentYear + '-' + String(currentMonth).padStart(2,'0');
  return entries.filter(e => e.date && e.date.startsWith(prefix));
}

function render() {
  document.getElementById('month-label').textContent = currentYear + '년 ' + currentMonth + '월';
  renderSummary();
  const activeTab = document.querySelector('.nav-btn.active')?.id?.replace('nav-','');
  if (activeTab === 'list') renderList();
  if (activeTab === 'chart') renderChart();
}

function renderSummary() {
  let income = 0, expense = 0, repTotal = 0;
  monthEntries().forEach(e => {
    if (e.type === 'in') income += e.amount;
    else {
      expense += e.amount;
      if ((e.tags||[]).includes('대표결제') && (e.tags||[]).includes('회수완료')) repTotal += e.amount;
    }
  });
  document.getElementById('s-income').textContent = fmt(income);
  document.getElementById('s-expense').textContent = fmt(expense);
  document.getElementById('s-real').textContent = fmt(expense - repTotal);
}

function renderList() {
  const el = document.getElementById('entry-list');
  const mes = monthEntries();
  if (!mes.length) { el.innerHTML = '<div class="notice">이번 달 내역이 없어요</div>'; return; }
  const grouped = {};
  mes.forEach(e => { if (!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
  const sorted = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  el.innerHTML = sorted.map(date => {
    const dayTotal = grouped[date].filter(e=>e.type==='out').reduce((s,e)=>s+e.amount,0);
    const d = new Date(date + 'T00:00:00');
    const dayNames = ['일','월','화','수','목','금','토'];
    const label = (currentMonth) + '/' + d.getDate() + ' (' + dayNames[d.getDay()] + ')';
    return `<div class="date-group-label"><span>${label}</span><span style="color:var(--danger);">-${fmt(dayTotal)}</span></div>` +
      grouped[date].map(e => `
        <div class="entry">
          <div class="entry-icon" style="background:${CATS[e.cat]||'#888'}22;">${CAT_ICONS[e.cat]||'💰'}</div>
          <div class="entry-info">
            <div class="entry-desc">${e.desc}${(e.tags||[]).map(t=>`<span class="badge">${t}</span>`).join('')}</div>
            <div class="entry-meta">${e.cat||'기타'}${e.who?' · '+e.who:''}</div>
          </div>
          <div class="entry-amount ${e.type}">${e.type==='out'?'-':'+'}${fmt(e.amount)}</div>
          <button class="del-btn" onclick="deleteEntry(${e.id})">×</button>
        </div>`).join('');
  }).join('');
}

function renderChart() {
  const totals = {};
  monthEntries().filter(e=>e.type==='out').forEach(e => {
    const k = e.cat||'기타'; totals[k]=(totals[k]||0)+e.amount;
  });
  const sorted = Object.entries(totals).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1]||1;
  const el = document.getElementById('chart-bars');
  if (!sorted.length) { el.innerHTML = '<div class="notice">내역을 추가하면 분석이 나와요</div>'; return; }
  el.innerHTML = sorted.map(([k,v]) =>
    `<div class="bar-row">
      <div class="bar-label">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${CATS[k]||'#888'};"></div></div>
      <div class="bar-val">${fmt(v)}</div>
    </div>`).join('');
  const ins = document.getElementById('insight-box');
  if (sorted[0]) {
    ins.innerHTML = `<div class="insight">지출 1위 <b>${sorted[0][0]}</b> ${fmt(sorted[0][1])} — 10% 줄이면 <b>${fmt(sorted[0][1]*0.1)}</b> 절약!</div>`;
  }
}

function showTab(t) {
  ['add','list','chart'].forEach(id => {
    document.getElementById('content-'+id).style.display = id===t ? '' : 'none';
    document.getElementById('nav-'+id).classList.toggle('active', id===t);
  });
  if (t==='list') renderList();
  if (t==='chart') renderChart();
}

load();
document.getElementById('f-date').value = selectedDate;
render();
</script>
</body>
</html>
